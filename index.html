<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Flowmap.gl pure js example</title>
    <style>
      /* 原有样式保留 */
      #container {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #000;
        /* 初始隐藏容器，密码验证通过后显示 */
        display: none;
      }

      #container > * {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #map {
        opacity: 0.5;
      }

      #deck-canvas {
        mix-blend-mode: screen;
      }

      /* 新增密码弹窗样式 */
      #password-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #222;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }

      #password-input {
        padding: 12px 20px;
        font-size: 18px;
        border: none;
        border-radius: 4px;
        width: 300px;
      }

      #password-btn {
        padding: 12px 40px;
        font-size: 18px;
        background: #0078ff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      #password-btn:hover {
        background: #0056b3;
      }

      .error {
        color: #ff4444;
        font-size: 16px;
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- 新增密码验证弹窗 -->
    <div id="password-modal">
      <input type="password" id="password-input" placeholder="请输入访问密码" />
      <button id="password-btn">确认</button>
      <div class="error" id="error-tip">密码错误，请重试！</div>
    </div>

    <!-- 原有容器 -->
    <div id="container">
      <div id="map"></div>
      <canvas id="deck-canvas"></canvas>
    </div>

    <script>
      // 第一步：定义正确的密码（可自行修改，建议后续放到后端验证）
      const CORRECT_PASSWORD = "chinaebus"; // 替换成你想要的密码

      // 第二步：获取DOM元素
      const modal = document.getElementById('password-modal');
      const input = document.getElementById('password-input');
      const btn = document.getElementById('password-btn');
      const errorTip = document.getElementById('error-tip');
      const container = document.getElementById('container');

      // 第三步：密码验证逻辑
      function checkPassword() {
        const inputVal = input.value.trim();
        if (inputVal === CORRECT_PASSWORD) {
          // 密码正确：隐藏弹窗、显示容器、加载业务代码
          modal.style.display = 'none';
          container.style.display = 'block';
          
          // 动态加载核心业务脚本（替代原有直接import）
          import('./src/app.js').catch(err => {
            console.error('加载业务脚本失败：', err);
          });
        } else {
          // 密码错误：显示提示、清空输入框
          errorTip.style.display = 'block';
          input.value = '';
          // 3秒后隐藏错误提示
          setTimeout(() => {
            errorTip.style.display = 'none';
          }, 3000);
        }
      }

      // 绑定按钮点击事件
      btn.addEventListener('click', checkPassword);
      // 绑定回车触发验证
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          checkPassword();
        }
      });
    </script>
  </head>
</html>
